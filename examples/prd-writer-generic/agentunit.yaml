apiVersion: agentunit.io/v1alpha1
kind: AgentUnit

metadata:
  name: prd-writer
  version: "1.0.0"
  description: "需求文档撰写单元 — 输入需求要点，输出结构化 PRD"
  author: "AgentUnit"
  license: "Apache-2.0"
  tags: [requirements, prd, writing, product-management]
  domain: [product-management]

contract:
  inputs:
    type: object
    properties:
      requirement_notes:
        type: string
        description: "需求要点或会议纪要"
      project_name:
        type: string
        description: "项目名称（可选）"
    required: [requirement_notes]
  outputs:
    type: object
    properties:
      prd_document:
        type: string
        description: "结构化 PRD Markdown 文档"
      quality_score:
        type: number
        description: "自评质量分（0-1）"

governance:
  require_human_approval: true
  max_token_per_task: 8000
  audit_enabled: true

protocol:
  mode: "request-response"
  streaming_type: "none"
  compatible_with: []
  supports_function_calling: false

runtime:
  framework: "generic-python"
  language: "python"
  entry: "app.py"
  model:
    provider: "openai"
    name: "gpt-4o"
  routing:
    default: hybrid
  components:
    skills:
      - name: prd_writer
        id: prd_writer
        path: skills/prd_writer.md
        description: "根据需求要点生成结构化 PRD 文档"
    tools:
      - name: doc_search
        path: tools/doc_search.py
    knowledge:
      - name: prd_template
        path: knowledge/prd_template.md
  dependencies:
    file: requirements.txt

resources:
  cpu: "1"
  memory: "512Mi"
  gpu: false
  timeout_seconds: 300
  concurrency: 10

services:
  outbound_network: true
  domains: ["api.openai.com"]

observability:
  evaluation_indicators:
    - field: "quality_score"
      description: "自评质量分"
      range: [0, 1]
      higher_is_better: true
  baselines:
    latency_p95_ms: 10000
    success_rate: 0.95

build:
  base_image: "python:3.11-slim"
  port: 8091
  health_check: "/health"
  env:
    MODEL_API_KEY: ""
    MODEL_BASE_URL: ""
